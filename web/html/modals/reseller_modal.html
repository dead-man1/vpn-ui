{{define "modals/resellerModal"}}
<a-modal id="reseller-modal" v-model="resellerModal.visible" :title="resellerModal.title" @ok="resellerModal.ok"
  :confirm-loading="resellerModal.confirmLoading" :closable="true" :mask-closable="false"
  :ok-text="resellerModal.okText" cancel-text='{{ i18n "close" }}' :class="themeSwitcher.currentTheme">
  <!-- label-col is 10, not 8: at 8 the three longest labels ("Minimum Account (GB)",
       "Minimum Top-Up (GB)", "Allow External Proxy") are wider than the box and lose
       their trailing characters and tooltip icon, since a form-item label does not
       wrap. 10 covers the widest of them and takes the width from the gap between
       the columns, so the controls keep the size they already had. -->
  <a-form :colon="false" :label-col="{ md: { span: 10 } }" :wrapper-col="{ md: { span: 14 } }">

    <a-form-item label='{{ i18n "pages.resellers.username" }}'>
      <a-input v-model.trim="resellerModal.reseller.username"></a-input>
    </a-form-item>

    <a-form-item>
      <template slot="label">
        <a-tooltip v-if="resellerModal.isEdit">
          <template slot="title">{{ i18n "pages.resellers.passwordUnchangedHint" }}</template>
          {{ i18n "pages.resellers.password" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
        <span v-else>{{ i18n "pages.resellers.password" }}</span>
      </template>
      <a-input-password v-model="resellerModal.reseller.password"
        :placeholder="resellerModal.isEdit ? '{{ i18n "pages.resellers.passwordUnchangedHint" }}' : ''"></a-input-password>
    </a-form-item>

    <a-form-item label='{{ i18n "pages.resellers.nickname" }}'>
      <a-input v-model.trim="resellerModal.reseller.nickname"></a-input>
    </a-form-item>

    <a-form-item label='{{ i18n "pages.resellers.enable" }}'>
      <a-switch v-model="resellerModal.reseller.enable"></a-switch>
    </a-form-item>

    <a-form-item>
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.allowExternalProxyDesc" }}</template>
          {{ i18n "pages.resellers.allowExternalProxy" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-switch v-model="resellerModal.reseller.allowExternalProxy"></a-switch>
    </a-form-item>

    <!-- Off by default: the overview reports the whole server (every inbound, total
         traffic, system load), none of which is the reseller's to see. Granted only
         where the reseller is trusted with that view. -->
    <a-form-item>
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.allowOverviewDesc" }}</template>
          {{ i18n "pages.resellers.allowOverview" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-switch v-model="resellerModal.reseller.allowOverview"></a-switch>
    </a-form-item>

    <a-form-item>
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.unlimitedDesc" }}</template>
          {{ i18n "pages.resellers.unlimited" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-switch v-model="resellerModal.reseller.unlimited"></a-switch>
    </a-form-item>

    <!-- The balance is settable ONCE, at creation. On edit it is shown but not editable,
         and Recharge (a delta) is the only way to move it: an admin typing over the total
         would silently rewrite the history every outstanding account was sold out of, and
         depending on which way they typed would either hand the reseller free traffic or
         strand accounts that are already live and already paid for. A delta cannot do that.
         Hidden entirely while unlimited is on, where a total means nothing. -->
    <a-form-item v-if="!resellerModal.reseller.unlimited">
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.totalTrafficDesc" }}</template>
          {{ i18n "pages.resellers.totalTraffic" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-input-number v-model.number="resellerModal.reseller.allowanceGb" :min="0"
        :disabled="resellerModal.isEdit" :style="{ width: '100%' }"></a-input-number>
      <div v-if="resellerModal.isEdit" :style="{ fontSize: '12px', color: '#8c8c8c' }">
        {{ i18n "pages.resellers.rechargeDesc" }}
      </div>
    </a-form-item>

    <a-form-item>
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.daysPerGbDesc" }}</template>
          {{ i18n "pages.resellers.daysPerGb" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-input-number v-model.number="resellerModal.reseller.daysPerGb" :min="0"></a-input-number>
    </a-form-item>

    <a-form-item>
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.minCreateGbDesc" }}</template>
          {{ i18n "pages.resellers.minCreateGb" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-input-number v-model.number="resellerModal.reseller.minCreateGb" :min="0"></a-input-number>
    </a-form-item>

    <a-form-item>
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.minAddGbDesc" }}</template>
          {{ i18n "pages.resellers.minAddGb" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-input-number v-model.number="resellerModal.reseller.minAddGb" :min="0"></a-input-number>
    </a-form-item>

    <!-- Which inbounds this reseller may sell on. Unticked means invisible to them, the
         same mask an admin gets, so a reseller can never create an account on an inbound
         the person who made them does not hold either. -->
    <a-form-item>
      <template slot="label">
        <a-tooltip>
          <template slot="title">{{ i18n "pages.resellers.inboundAccessDesc" }}</template>
          {{ i18n "pages.resellers.inboundAccess" }}
          <a-icon type="question-circle"></a-icon>
        </a-tooltip>
      </template>
      <a-alert v-if="!resellerModal.allInbounds.length" type="info" show-icon
        message='{{ i18n "pages.resellers.noInbounds" }}'></a-alert>
      <template v-else>
        <a-checkbox :checked="resellerModal.allChecked" :indeterminate="resellerModal.someChecked"
          @change="resellerModal.toggleAll">
          <span :style="{ fontWeight: 500 }">{{ i18n "pages.resellers.selectAllInbounds" }}</span>
        </a-checkbox>
        <a-divider :style="{ margin: '8px 0' }"></a-divider>
        <div :style="{ maxHeight: '180px', overflowY: 'auto' }">
          <a-checkbox-group v-model="resellerModal.reseller.inboundIds" :style="{ width: '100%' }">
            <a-row>
              <a-col :span="24" v-for="ib in resellerModal.allInbounds" :key="ib.id">
                <a-checkbox :value="ib.id">
                  [[ ib.remark || ('#' + ib.id) ]]
                  <a-tag :style="{ marginLeft: '4px' }">[[ ib.protocol ]]</a-tag>
                  <span :style="{ color: '#8c8c8c' }">:[[ ib.port ]]</span>
                </a-checkbox>
              </a-col>
            </a-row>
          </a-checkbox-group>
        </div>
      </template>
    </a-form-item>
  </a-form>
</a-modal>

<script>
  const ONE_GB_BYTES = 1024 * 1024 * 1024;

  const resellerModal = {
    title: '',
    visible: false,
    confirmLoading: false,
    okText: '{{ i18n "sure" }}',
    isEdit: false,
    confirm: null,
    allInbounds: [],
    reseller: {
      id: 0, username: '', password: '', nickname: '', enable: true,
      unlimited: false, allowanceGb: 0, daysPerGb: 0, minCreateGb: 0, minAddGb: 0,
      allowExternalProxy: false, allowOverview: false, inboundIds: [],
    },

    get allChecked() {
      const picked = resellerModal.reseller.inboundIds || [];
      return resellerModal.allInbounds.length > 0 &&
        picked.length === resellerModal.allInbounds.length;
    },
    get someChecked() {
      const n = (resellerModal.reseller.inboundIds || []).length;
      return n > 0 && n < resellerModal.allInbounds.length;
    },
    toggleAll(e) {
      resellerModal.reseller.inboundIds = e.target.checked
        ? resellerModal.allInbounds.map(ib => ib.id)
        : [];
    },
    ok() {
      ObjectUtil.execute(resellerModal.confirm, resellerModal.reseller);
    },
    show({ title = '', okText = '{{ i18n "sure" }}', reseller = null, allInbounds = [], confirm = () => { }, isEdit = false }) {
      this.title = title;
      this.okText = okText;
      this.confirm = confirm;
      this.isEdit = isEdit;
      this.allInbounds = allInbounds || [];
      if (isEdit && reseller) {
        this.reseller = {
          id: reseller.id,
          username: reseller.username,
          password: '', // blank means "keep the current one"
          nickname: reseller.nickname || '',
          enable: !!reseller.enable,
          unlimited: !!reseller.unlimited,
          // Every balance movement is a whole number of GB (create, recharge), so the
          // round is exact and only exists to keep a float out of the form.
          allowanceGb: Math.round((Number(reseller.allowanceBytes) || 0) / ONE_GB_BYTES),
          daysPerGb: Number(reseller.daysPerGb) || 0,
          minCreateGb: Number(reseller.minCreateGb) || 0,
          minAddGb: Number(reseller.minAddGb) || 0,
          allowExternalProxy: !!reseller.allowExternalProxy,
          allowOverview: !!reseller.allowOverview,
          inboundIds: (reseller.inboundIds || []).slice(),
        };
      } else {
        this.reseller = {
          id: 0, username: '', password: '', nickname: '', enable: true,
          unlimited: false, allowanceGb: 0, daysPerGb: 0, minCreateGb: 0, minAddGb: 0,
          allowExternalProxy: false, allowOverview: false, inboundIds: [],
        };
      }
      this.visible = true;
    },
    // Bodies are form-urlencoded (a global axios interceptor Qs.stringify's them), and Qs
    // emits an array as repeated keys, which is what Gin binds into []string. Numbers are
    // coerced here because a cleared a-input-number yields undefined, which posts as an
    // empty value and fails int binding server-side.
    toPayload(reseller) {
      return {
        username: reseller.username,
        password: reseller.password,
        nickname: reseller.nickname,
        enable: reseller.enable,
        unlimited: reseller.unlimited,
        // On edit this is the unchanged current balance: the field is disabled, so posting
        // it back is a no-op whichever way the server reads it. Recharge moves the balance.
        allowanceGb: Number(reseller.allowanceGb) || 0,
        daysPerGb: Number(reseller.daysPerGb) || 0,
        minCreateGb: Number(reseller.minCreateGb) || 0,
        minAddGb: Number(reseller.minAddGb) || 0,
        allowExternalProxy: reseller.allowExternalProxy,
        allowOverview: reseller.allowOverview,
        // A blank entry is how "none" is sent: an omitted key binds as nil server-side and
        // cannot be told apart from "leave the existing grants alone".
        inboundIds: (reseller.inboundIds || []).length ? reseller.inboundIds : [''],
      };
    },
    close() {
      resellerModal.visible = false;
      resellerModal.loading(false);
    },
    loading(loading = true) {
      resellerModal.confirmLoading = loading;
    },
  };

  new Vue({
    delimiters: ['[[', ']]'],
    el: '#reseller-modal',
    data: { resellerModal: resellerModal },
  });
</script>
{{end}}
